image: node:18

variables:
  VM_IP: "20.66.30.49"
  APP_DIR: "/var/www/cupid-app"

stages:
  - test
  - build
  - deploy

before_script:
  - apt-get update -qq && apt-get install -y -qq openssh-client python3-pip
  - mkdir -p ~/.ssh && chmod 700 ~/.ssh
  - echo "$AZURE_PRIVATE_KEY_B64" | base64 -d > ~/.ssh/id_rsa
  - chmod 600 ~/.ssh/id_rsa
  - ssh-keyscan -H $VM_IP >> ~/.ssh/known_hosts 2>/dev/null

test:
  stage: test
  script:
    - echo "Running frontend tests..."
    - cd Code/client
    - npm install
    - npm run test 2>/dev/null || echo "No tests found, skipping"
  only:
    - master

build:
  stage: build
  script:
    - echo "Building Vue.js frontend..."
    - cd Code/client
    - npm install
    - npm run build
    - echo "Frontend build complete"
  artifacts:
    paths:
      - Code/server/
    expire_in: 1 week
  only:
    - master

deploy:
  stage: deploy
  dependencies:
    - build
  script:
    - echo "Starting deployment to Azure VM..."
    
    # Prepare deployment directory
    - |
      ssh -o StrictHostKeyChecking=no azureuser@$VM_IP "
        sudo mkdir -p $APP_DIR &&
        sudo chown -R azureuser:azureuser $APP_DIR &&
        sudo rm -rf $APP_DIR/* 2>/dev/null || true
      "
    
    # Upload application files
    - echo "Uploading Django application..."
    - scp -o StrictHostKeyChecking=no -r Code/server/* azureuser@$VM_IP:$APP_DIR/
    
    # Create production Django settings
    - echo "Configuring Django settings..."
    - |
      ssh -o StrictHostKeyChecking=no azureuser@$VM_IP "
        cd $APP_DIR
        cat > production_settings.py << 'SETTINGS_EOF'
# Production settings for Cupid Code
from .settings import *
import os

# Security settings
DEBUG = False
SECRET_KEY = 'cupid-production-key-change-in-real-deployment'
ALLOWED_HOSTS = ['*', '$VM_IP', 'localhost', '127.0.0.1']

# Static files
STATIC_ROOT = os.path.join(BASE_DIR, 'staticfiles')
STATIC_URL = '/static/'

# Database (keeping SQLite for simplicity)
DATABASES = {
    'default': {
        'ENGINE': 'django.db.backends.sqlite3',
        'NAME': BASE_DIR / 'db.sqlite3',
    }
}

# Disable debug toolbar in production
if 'debug_toolbar' in INSTALLED_APPS:
    INSTALLED_APPS.remove('debug_toolbar')
    
MIDDLEWARE = [m for m in MIDDLEWARE if 'debug_toolbar' not in m]
SETTINGS_EOF
      "
    
    # Setup Python environment and Django
    - echo "Setting up Python environment..."
    - |
      ssh -o StrictHostKeyChecking=no azureuser@$VM_IP "
        cd $APP_DIR &&
        sudo apt-get update -qq &&
        sudo apt-get install -y -qq python3-pip python3-venv libapache2-mod-wsgi-py3 &&
        python3 -m venv venv &&
        source venv/bin/activate &&
        pip install --upgrade pip &&
        pip install -r requirements.txt &&
        mkdir -p staticfiles media
      "
    
    # Configure WSGI to use production settings
    - echo "Configuring WSGI..."
    - |
      ssh -o StrictHostKeyChecking=no azureuser@$VM_IP "
        cd $APP_DIR
        cat > server/wsgi_production.py << 'WSGI_EOF'
import os
import sys
from django.core.wsgi import get_wsgi_application

# Add the project directory to Python path
sys.path.insert(0, '/var/www/cupid-app')

# Use production settings
os.environ.setdefault('DJANGO_SETTINGS_MODULE', 'production_settings')

application = get_wsgi_application()
WSGI_EOF
      "
    
    # Run Django management commands
    - echo "Running Django setup..."
    - |
      ssh -o StrictHostKeyChecking=no azureuser@$VM_IP "
        cd $APP_DIR &&
        source venv/bin/activate &&
        export DJANGO_SETTINGS_MODULE=production_settings &&
        python manage.py migrate --noinput &&
        python manage.py collectstatic --noinput
      "
    
    # Configure Apache
    - echo "Configuring Apache..."
    - |
      ssh -o StrictHostKeyChecking=no azureuser@$VM_IP "
        sudo a2enmod wsgi &&
        sudo tee /etc/apache2/sites-available/cupid-app.conf > /dev/null << 'APACHE_EOF'
<VirtualHost *:80>
    ServerName $VM_IP
    DocumentRoot $APP_DIR
    
    WSGIDaemonProcess cupidapp python-path=$APP_DIR python-home=$APP_DIR/venv
    WSGIProcessGroup cupidapp
    WSGIScriptAlias / $APP_DIR/server/wsgi_production.py
    
    <Directory $APP_DIR>
        WSGIApplicationGroup %{GLOBAL}
        Require all granted
    </Directory>
    
    <Directory $APP_DIR/server>
        <Files wsgi_production.py>
            Require all granted
        </Files>
    </Directory>
    
    Alias /static $APP_DIR/staticfiles
    <Directory $APP_DIR/staticfiles>
        Require all granted
    </Directory>
    
    Alias /media $APP_DIR/media
    <Directory $APP_DIR/media>
        Require all granted
    </Directory>
    
    ErrorLog \${APACHE_LOG_DIR}/cupid_error.log
    CustomLog \${APACHE_LOG_DIR}/cupid_access.log combined
    LogLevel info
</VirtualHost>
APACHE_EOF
      "
    
    # Enable site and restart Apache
    - echo "Starting Apache..."
    - |
      ssh -o StrictHostKeyChecking=no azureuser@$VM_IP "
        sudo a2dissite 000-default 2>/dev/null || true &&
        sudo a2ensite cupid-app &&
        sudo chown -R www-data:www-data $APP_DIR &&
        sudo chmod -R 755 $APP_DIR &&
        sudo systemctl restart apache2 &&
        sudo systemctl enable apache2
      "
    
    # Verification
    - echo "Verifying deployment..."
    - |
      ssh -o StrictHostKeyChecking=no azureuser@$VM_IP "
        echo 'Apache status:' &&
        sudo systemctl is-active apache2 &&
        echo 'Testing application:' &&
        sleep 5 &&
        curl -s -w 'HTTP Status: %{http_code}\n' http://localhost/ || echo 'Connection test failed'
      "
    
    - echo "Deployment completed! Visit http://$VM_IP"
  only:
    - master