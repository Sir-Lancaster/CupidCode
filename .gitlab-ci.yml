image: node:18

stages:
  - test
  - build
  - deploy

before_script:
  - apt-get update && apt-get install -y openssh-client python3-pip
  - |
    mkdir -p ~/.ssh
    chmod 700 ~/.ssh
    PEM_KEY_PATH=~/key.pem
    echo "$AZURE_PRIVATE_KEY_B64" | base64 -d > $PEM_KEY_PATH
    chmod 600 $PEM_KEY_PATH
    ssh-keyscan -H $VM_PUBLIC_IP >> ~/.ssh/known_hosts 2>/dev/null || echo "Could not scan host, continuing..."
    if ! ssh-keygen -yf $PEM_KEY_PATH > /dev/null 2>&1; then
      echo "ERROR: Private key is invalid or not in a supported format."
      exit 1
    fi

test:
  stage: test
  script:
    - echo "Running tests..."
    - cd Code/client
    - npm install
    - npm run test 2>/dev/null || echo "No test script found, skipping tests"
  only:
    - master

build:
  stage: build
  script:
    - echo "Building Vue frontend..."
    - cd Code/client
    - npm install
    - npm run build
    - echo "Build completed"
    - ls -la ../server/core/static/core/
    - echo "Preparing complete Django application..."
    - cd ../server
    - echo "Django files:"
    - ls -la
  artifacts:
    paths:
      - Code/server/
    expire_in: 1 week
  only:
    - master

deploy:
  stage: deploy
  dependencies:
    - build
  script:
    - echo "Deploying complete Django + Vue application to Azure VM..."
    
    # Create application directory
    - ssh -i $PEM_KEY_PATH -o StrictHostKeyChecking=no azureuser@$VM_PUBLIC_IP "sudo mkdir -p /var/www/cupid-app && sudo chown azureuser:azureuser /var/www/cupid-app"
    
    # Clean previous deployment with proper permissions
    - ssh -i $PEM_KEY_PATH -o StrictHostKeyChecking=no azureuser@$VM_PUBLIC_IP "sudo chown -R azureuser:azureuser /var/www/cupid-app && sudo rm -rf /var/www/cupid-app/*"
    
    # Upload Django application
    - scp -i $PEM_KEY_PATH -o StrictHostKeyChecking=no -r Code/server/* azureuser@$VM_PUBLIC_IP:/var/www/cupid-app/
    
    # Create production .env file
    - |
      ssh -i $PEM_KEY_PATH -o StrictHostKeyChecking=no azureuser@$VM_PUBLIC_IP "
      cd /var/www/cupid-app &&
      cat > .env << 'EOF'
      DEBUG=False
      SECRET_KEY=your-production-secret-key-here-change-this-in-production
      ALLOWED_HOSTS=*
      DATABASE_URL=sqlite:///db.sqlite3
      STATIC_ROOT=/var/www/cupid-app/staticfiles
      STATIC_URL=/static/
      EOF
      "
    
    # Fix Django settings for production - DO NOT APPEND, MODIFY EXISTING
    - |
      ssh -i $PEM_KEY_PATH -o StrictHostKeyChecking=no azureuser@$VM_PUBLIC_IP "
      cd /var/www/cupid-app &&
      python3 << 'PYEOF'
      import os
      settings_file = 'server/settings.py'
      with open(settings_file, 'r') as f:
          content = f.read()
      
      # Remove any existing production settings block
      if '# Production settings' in content:
          lines = content.split('\n')
          new_lines = []
          skip = False
          for line in lines:
              if '# Production settings' in line:
                  skip = True
              elif skip and line.strip() and not line.startswith(' ') and not line.startswith('\t'):
                  skip = False
              if not skip:
                  new_lines.append(line)
          content = '\n'.join(new_lines)
      
      # Add corrected production settings
      production_settings = '''
      # Production settings
      import os
      ALLOWED_HOSTS = ['*', '20.66.30.49', 'localhost', '127.0.0.1']
      DEBUG = False
      STATIC_ROOT = os.path.join(BASE_DIR, 'staticfiles')
      STATIC_URL = '/static/'
      MEDIA_ROOT = os.path.join(BASE_DIR, 'media')
      MEDIA_URL = '/media/'
      
      # Security settings for production
      CSRF_COOKIE_SECURE = False  # Set to True if using HTTPS
      SESSION_COOKIE_SECURE = False  # Set to True if using HTTPS
      
      # Fix for WSGI
      import sys
      sys.path.insert(0, '/var/www/cupid-app')
      '''
      
      with open(settings_file, 'w') as f:
          f.write(content + production_settings)
      
      print('Settings updated successfully')
      PYEOF
      "
    
    # Install Python dependencies and setup Django
    - |
      ssh -i $PEM_KEY_PATH -o StrictHostKeyChecking=no azureuser@$VM_PUBLIC_IP "
      cd /var/www/cupid-app &&
      sudo apt-get update -qq &&
      sudo apt-get install -y python3-pip python3-venv python3-dev &&
      python3 -m venv venv &&
      source venv/bin/activate &&
      pip install --upgrade pip &&
      pip install -r requirements.txt &&
      mkdir -p staticfiles media &&
      python manage.py migrate --noinput &&
      python manage.py collectstatic --noinput --clear
      "
    
    # Configure Apache with mod_wsgi for Django
    - |
      ssh -i $PEM_KEY_PATH -o StrictHostKeyChecking=no azureuser@$VM_PUBLIC_IP "
      sudo apt-get install -y apache2 libapache2-mod-wsgi-py3 &&
      sudo a2enmod wsgi &&
      sudo tee /etc/apache2/sites-available/cupid-app.conf > /dev/null << 'EOF'
      <VirtualHost *:80>
          ServerName 20.66.30.49
          ServerAlias localhost
          DocumentRoot /var/www/cupid-app
          
          # WSGI Configuration
          WSGIDaemonProcess cupidapp python-path=/var/www/cupid-app python-home=/var/www/cupid-app/venv processes=2 threads=15 display-name=%{GROUP}
          WSGIProcessGroup cupidapp
          WSGIScriptAlias / /var/www/cupid-app/server/wsgi.py
          WSGIApplicationGroup %{GLOBAL}
          WSGIPassAuthorization On
          
          # Django application directory
          <Directory /var/www/cupid-app/server>
              <Files wsgi.py>
                  Require all granted
              </Files>
          </Directory>
          
          # Static files
          Alias /static /var/www/cupid-app/staticfiles
          <Directory /var/www/cupid-app/staticfiles>
              Require all granted
              Options -Indexes
          </Directory>
          
          # Media files
          Alias /media /var/www/cupid-app/media
          <Directory /var/www/cupid-app/media>
              Require all granted
              Options -Indexes
          </Directory>
          
          # Logging
          ErrorLog \${APACHE_LOG_DIR}/cupid_error.log
          CustomLog \${APACHE_LOG_DIR}/cupid_access.log combined
          LogLevel warn
      </VirtualHost>
      EOF
      "
    
    # Set correct permissions and restart Apache
    - |
      ssh -i $PEM_KEY_PATH -o StrictHostKeyChecking=no azureuser@$VM_PUBLIC_IP "
      sudo a2dissite 000-default.conf 2>/dev/null || echo 'Default site already disabled' &&
      sudo a2dissite django-app.conf 2>/dev/null || echo 'Previous django site not found' &&
      sudo a2ensite cupid-app.conf &&
      
      # Critical: Fix permissions for database and directories
      sudo chown -R www-data:www-data /var/www/cupid-app &&
      sudo chmod -R 755 /var/www/cupid-app &&
      sudo chmod 664 /var/www/cupid-app/db.sqlite3 2>/dev/null || echo 'db.sqlite3 will be created on first run' &&
      sudo chmod 775 /var/www/cupid-app 2>/dev/null || true &&
      
      # Test Apache configuration
      sudo apache2ctl configtest &&
      
      # Restart Apache
      sudo systemctl restart apache2 &&
      sleep 2
      "
    
    # Verify deployment and show logs if there are errors
    - |
      ssh -i $PEM_KEY_PATH -o StrictHostKeyChecking=no azureuser@$VM_PUBLIC_IP "
      echo '=====================================' &&
      echo 'Deployment verification:' &&
      echo '=====================================' &&
      ls -la /var/www/cupid-app/ &&
      echo '' &&
      echo 'Apache status:' &&
      sudo systemctl status apache2 --no-pager -l | head -15 &&
      echo '' &&
      echo 'Testing local connection:' &&
      HTTP_CODE=\$(curl -s -o /dev/null -w '%{http_code}' http://localhost/) &&
      echo \"HTTP Response Code: \$HTTP_CODE\" &&
      if [ \"\$HTTP_CODE\" != \"200\" ]; then
        echo '' &&
        echo '=====================================' &&
        echo 'ERROR LOGS (last 30 lines):' &&
        echo '=====================================' &&
        sudo tail -30 /var/log/apache2/cupid_error.log
      else
        echo '✅ Application is responding successfully!'
      fi
      "
    
    - echo "======================================"
    - echo "✅ Deployment Complete!"
    - echo "======================================"
    - echo "🌐 Application URL: http://$VM_PUBLIC_IP"
    - echo ""
    - echo "To check logs if issues occur:"
    - echo "  sudo tail -f /var/log/apache2/cupid_error.log"
  only:
    - master