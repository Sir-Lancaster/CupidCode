image: node:18

stages:
  - test
  - build
  - deploy

before_script:
  - apt-get update && apt-get install -y openssh-client python3-pip
  - |
    mkdir -p ~/.ssh
    chmod 700 ~/.ssh
    PEM_KEY_PATH=~/key.pem
    echo "$AZURE_PRIVATE_KEY_B64" | base64 -d > $PEM_KEY_PATH
    chmod 600 $PEM_KEY_PATH
    ssh-keyscan -H $VM_PUBLIC_IP >> ~/.ssh/known_hosts 2>/dev/null || echo "Could not scan host, continuing..."
    if ! ssh-keygen -yf $PEM_KEY_PATH > /dev/null 2>&1; then
      echo "ERROR: Private key is invalid or not in a supported format."
      exit 1
    fi

test:
  stage: test
  script:
    - echo "Running tests..."
    - cd Code/client
    - npm install
    - npm run test 2>/dev/null || echo "No test script found, skipping tests"
  only:
    - yaml

build:
  stage: build
  script:
    - echo "Building Vue frontend..."
    - cd Code/client
    - npm install
    - npm run build
    - echo "Build completed"
    - ls -la ../server/core/static/core/
    - echo "Preparing complete Django application..."
    - cd ../server
    - echo "Django files:"
    - ls -la
  artifacts:
    paths:
      - Code/server/
    expire_in: 1 week
  only:
    - yaml

deploy:
  stage: deploy
  dependencies:
    - build
  script:
    - echo "Deploying complete Django + Vue application to Azure VM with HTTPS support..."
    
    # Create application directory
    - ssh -i $PEM_KEY_PATH -o StrictHostKeyChecking=no azureuser@$VM_PUBLIC_IP "sudo mkdir -p /var/www/cupid-app && sudo chown azureuser:azureuser /var/www/cupid-app"
    
    # Clean previous deployment with proper permissions
    - ssh -i $PEM_KEY_PATH -o StrictHostKeyChecking=no azureuser@$VM_PUBLIC_IP "sudo chown -R azureuser:azureuser /var/www/cupid-app && sudo rm -rf /var/www/cupid-app/*"
    
    # Upload Django application
    - scp -i $PEM_KEY_PATH -o StrictHostKeyChecking=no -r Code/server/* azureuser@$VM_PUBLIC_IP:/var/www/cupid-app/
    
    # Create production .env file with HTTPS configuration
    - ssh -i $PEM_KEY_PATH -o StrictHostKeyChecking=no azureuser@$VM_PUBLIC_IP "cd /var/www/cupid-app"
    - ssh -i $PEM_KEY_PATH -o StrictHostKeyChecking=no azureuser@$VM_PUBLIC_IP "cat > /var/www/cupid-app/.env << 'EOF'"
    - ssh -i $PEM_KEY_PATH -o StrictHostKeyChecking=no azureuser@$VM_PUBLIC_IP "echo 'DEBUG=False' >> /var/www/cupid-app/.env"
    - ssh -i $PEM_KEY_PATH -o StrictHostKeyChecking=no azureuser@$VM_PUBLIC_IP "echo 'SECRET_KEY=your-production-secret-key-here-change-this-in-production' >> /var/www/cupid-app/.env"
    - ssh -i $PEM_KEY_PATH -o StrictHostKeyChecking=no azureuser@$VM_PUBLIC_IP "echo 'ALLOWED_HOSTS=cupidcode.zapto.org,www.cupidcode.zapto.org,localhost,127.0.0.1' >> /var/www/cupid-app/.env"
    - ssh -i $PEM_KEY_PATH -o StrictHostKeyChecking=no azureuser@$VM_PUBLIC_IP "echo 'DATABASE_URL=sqlite:///db.sqlite3' >> /var/www/cupid-app/.env"
    - ssh -i $PEM_KEY_PATH -o StrictHostKeyChecking=no azureuser@$VM_PUBLIC_IP "echo 'STATIC_ROOT=/var/www/cupid-app/staticfiles' >> /var/www/cupid-app/.env"
    - ssh -i $PEM_KEY_PATH -o StrictHostKeyChecking=no azureuser@$VM_PUBLIC_IP "echo 'STATIC_URL=/static/' >> /var/www/cupid-app/.env"
    - ssh -i $PEM_KEY_PATH -o StrictHostKeyChecking=no azureuser@$VM_PUBLIC_IP "echo 'SECURE_SSL_REDIRECT=True' >> /var/www/cupid-app/.env"
    - ssh -i $PEM_KEY_PATH -o StrictHostKeyChecking=no azureuser@$VM_PUBLIC_IP "echo 'SECURE_PROXY_SSL_HEADER=(\\\"HTTP_X_FORWARDED_PROTO\\\", \\\"https\\\")' >> /var/www/cupid-app/.env"
    - ssh -i $PEM_KEY_PATH -o StrictHostKeyChecking=no azureuser@$VM_PUBLIC_IP "echo 'SESSION_COOKIE_SECURE=True' >> /var/www/cupid-app/.env"
    - ssh -i $PEM_KEY_PATH -o StrictHostKeyChecking=no azureuser@$VM_PUBLIC_IP "echo 'CSRF_COOKIE_SECURE=True' >> /var/www/cupid-app/.env"
    - ssh -i $PEM_KEY_PATH -o StrictHostKeyChecking=no azureuser@$VM_PUBLIC_IP "echo 'EOF' >> /var/www/cupid-app/.env"
    
    # Add production settings to Django settings file with HTTPS security
    - ssh -i $PEM_KEY_PATH -o StrictHostKeyChecking=no azureuser@$VM_PUBLIC_IP "cd /var/www/cupid-app && echo '' >> server/settings.py"
    - ssh -i $PEM_KEY_PATH -o StrictHostKeyChecking=no azureuser@$VM_PUBLIC_IP "echo '# Production HTTPS settings' >> /var/www/cupid-app/server/settings.py"
    - ssh -i $PEM_KEY_PATH -o StrictHostKeyChecking=no azureuser@$VM_PUBLIC_IP "echo 'import os' >> /var/www/cupid-app/server/settings.py"
    - ssh -i $PEM_KEY_PATH -o StrictHostKeyChecking=no azureuser@$VM_PUBLIC_IP "echo 'STATIC_ROOT = os.path.join(BASE_DIR, \\\"staticfiles\\\")' >> /var/www/cupid-app/server/settings.py"
    - ssh -i $PEM_KEY_PATH -o StrictHostKeyChecking=no azureuser@$VM_PUBLIC_IP "echo 'ALLOWED_HOSTS = [\\\"cupidcode.zapto.org\\\", \\\"www.cupidcode.zapto.org\\\", \\\"localhost\\\", \\\"127.0.0.1\\\"]' >> /var/www/cupid-app/server/settings.py"
    - ssh -i $PEM_KEY_PATH -o StrictHostKeyChecking=no azureuser@$VM_PUBLIC_IP "echo 'DEBUG = False' >> /var/www/cupid-app/server/settings.py"
    - ssh -i $PEM_KEY_PATH -o StrictHostKeyChecking=no azureuser@$VM_PUBLIC_IP "echo '# HTTPS Security Settings' >> /var/www/cupid-app/server/settings.py"
    - ssh -i $PEM_KEY_PATH -o StrictHostKeyChecking=no azureuser@$VM_PUBLIC_IP "echo 'SECURE_SSL_REDIRECT = True' >> /var/www/cupid-app/server/settings.py"
    - ssh -i $PEM_KEY_PATH -o StrictHostKeyChecking=no azureuser@$VM_PUBLIC_IP "echo 'SECURE_PROXY_SSL_HEADER = (\\\"HTTP_X_FORWARDED_PROTO\\\", \\\"https\\\")' >> /var/www/cupid-app/server/settings.py"
    - ssh -i $PEM_KEY_PATH -o StrictHostKeyChecking=no azureuser@$VM_PUBLIC_IP "echo 'SESSION_COOKIE_SECURE = True' >> /var/www/cupid-app/server/settings.py"
    - ssh -i $PEM_KEY_PATH -o StrictHostKeyChecking=no azureuser@$VM_PUBLIC_IP "echo 'CSRF_COOKIE_SECURE = True' >> /var/www/cupid-app/server/settings.py"
    - ssh -i $PEM_KEY_PATH -o StrictHostKeyChecking=no azureuser@$VM_PUBLIC_IP "echo 'SECURE_BROWSER_XSS_FILTER = True' >> /var/www/cupid-app/server/settings.py"
    - ssh -i $PEM_KEY_PATH -o StrictHostKeyChecking=no azureuser@$VM_PUBLIC_IP "echo 'SECURE_CONTENT_TYPE_NOSNIFF = True' >> /var/www/cupid-app/server/settings.py"
    
    # Install Python dependencies and setup Django
    - ssh -i $PEM_KEY_PATH -o StrictHostKeyChecking=no azureuser@$VM_PUBLIC_IP "cd /var/www/cupid-app && sudo apt-get update && sudo apt-get install -y python3-pip python3-venv"
    - ssh -i $PEM_KEY_PATH -o StrictHostKeyChecking=no azureuser@$VM_PUBLIC_IP "cd /var/www/cupid-app && python3 -m venv venv"
    - ssh -i $PEM_KEY_PATH -o StrictHostKeyChecking=no azureuser@$VM_PUBLIC_IP "cd /var/www/cupid-app && source venv/bin/activate && pip install -r requirements.txt"
    - ssh -i $PEM_KEY_PATH -o StrictHostKeyChecking=no azureuser@$VM_PUBLIC_IP "cd /var/www/cupid-app && mkdir -p staticfiles"
    - ssh -i $PEM_KEY_PATH -o StrictHostKeyChecking=no azureuser@$VM_PUBLIC_IP "cd /var/www/cupid-app && source venv/bin/activate && python manage.py migrate --noinput"
    - ssh -i $PEM_KEY_PATH -o StrictHostKeyChecking=no azureuser@$VM_PUBLIC_IP "cd /var/www/cupid-app && source venv/bin/activate && python manage.py collectstatic --noinput"
    - ssh -i $PEM_KEY_PATH -o StrictHostKeyChecking=no azureuser@$VM_PUBLIC_IP "cd /var/www/cupid-app && mkdir -p staticfiles/assets/ && cp staticfiles/core/assets/* staticfiles/assets/ 2>/dev/null || echo 'No Vue assets to copy'"
    - ssh -i $PEM_KEY_PATH -o StrictHostKeyChecking=no azureuser@$VM_PUBLIC_IP "cd /var/www/cupid-app && echo 'Creating WSGI file...'"
    
    # Configure Apache with SSL support and ensure mod_ssl is enabled
    - ssh -i $PEM_KEY_PATH -o StrictHostKeyChecking=no azureuser@$VM_PUBLIC_IP "sudo apt-get install -y libapache2-mod-wsgi-py3"
    - ssh -i $PEM_KEY_PATH -o StrictHostKeyChecking=no azureuser@$VM_PUBLIC_IP "sudo a2enmod wsgi && sudo a2enmod ssl && sudo a2enmod headers && sudo a2enmod rewrite"
    - ssh -i $PEM_KEY_PATH -o StrictHostKeyChecking=no azureuser@$VM_PUBLIC_IP "echo 'WSGIPythonPath /var/www/cupid-app:/var/www/cupid-app/venv/lib/python3.12/site-packages' | sudo tee /etc/apache2/conf-available/wsgi.conf"
    - ssh -i $PEM_KEY_PATH -o StrictHostKeyChecking=no azureuser@$VM_PUBLIC_IP "sudo a2enconf wsgi"
    
    # Enable sites and restart Apache
    - ssh -i $PEM_KEY_PATH -o StrictHostKeyChecking=no azureuser@$VM_PUBLIC_IP "sudo a2dissite 000-default.conf 2>/dev/null || echo 'Default site already disabled'"
    - ssh -i $PEM_KEY_PATH -o StrictHostKeyChecking=no azureuser@$VM_PUBLIC_IP "sudo a2ensite cupid-app.conf && sudo a2ensite cupid-app-le-ssl.conf"
    - ssh -i $PEM_KEY_PATH -o StrictHostKeyChecking=no azureuser@$VM_PUBLIC_IP "sudo chown -R www-data:www-data /var/www/cupid-app && sudo chmod -R 755 /var/www/cupid-app"
    - ssh -i $PEM_KEY_PATH -o StrictHostKeyChecking=no azureuser@$VM_PUBLIC_IP "sudo apache2ctl configtest && sudo systemctl restart apache2 && sudo systemctl status apache2 --no-pager"
    
    # Verify deployment with both HTTP and HTTPS
    - ssh -i $PEM_KEY_PATH -o StrictHostKeyChecking=no azureuser@$VM_PUBLIC_IP "echo 'Deployment verification:' && ls -la /var/www/cupid-app/"
    - ssh -i $PEM_KEY_PATH -o StrictHostKeyChecking=no azureuser@$VM_PUBLIC_IP "echo 'Apache SSL modules:' && sudo apache2ctl -M | grep ssl"
    - ssh -i $PEM_KEY_PATH -o StrictHostKeyChecking=no azureuser@$VM_PUBLIC_IP "echo 'Virtual hosts configuration:' && sudo apache2ctl -S"
    - ssh -i $PEM_KEY_PATH -o StrictHostKeyChecking=no azureuser@$VM_PUBLIC_IP "echo 'Testing connections:' && sleep 5"
    - ssh -i $PEM_KEY_PATH -o StrictHostKeyChecking=no azureuser@$VM_PUBLIC_IP "echo 'HTTP test (should redirect):' && curl -I http://localhost/ 2>/dev/null | head -5"
    - ssh -i $PEM_KEY_PATH -o StrictHostKeyChecking=no azureuser@$VM_PUBLIC_IP "echo 'HTTPS test:' && curl -I -k https://localhost/ 2>/dev/null | head -5 || echo 'HTTPS localhost test failed - check certificate configuration'"
    - ssh -i $PEM_KEY_PATH -o StrictHostKeyChecking=no azureuser@$VM_PUBLIC_IP "echo 'SSL certificate verification:' && sudo certbot certificates | grep cupidcode.zapto.org"
    
    - echo "Complete Django + Vue deployment with HTTPS finished!"
    - echo "Your application should be available at: https://cupidcode.zapto.org"
    - echo "HTTP requests will automatically redirect to HTTPS"
  only:
    - yaml