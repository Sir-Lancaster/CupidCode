image: node:18

stages:
  - test
  - build
  - deploy

before_script:
  - apt-get update && apt-get install -y openssh-client python3-pip
  - |
    # Create SSH directory first
    mkdir -p ~/.ssh
    chmod 700 ~/.ssh
    
    PEM_KEY_PATH=~/key.pem
    echo "$AZURE_PRIVATE_KEY_B64" | base64 -d > $PEM_KEY_PATH
    chmod 600 $PEM_KEY_PATH
    
    # Add VM to known hosts
    ssh-keyscan -H $VM_PUBLIC_IP >> ~/.ssh/known_hosts 2>/dev/null || echo "Could not scan host, continuing..."

    if ! ssh-keygen -yf $PEM_KEY_PATH > /dev/null 2>&1; then
      echo "ERROR: Private key is invalid or not in a supported format."
      exit 1
    fi

test:
  stage: test
  script:
    - echo "Running tests..."
    - cd Code/client
    - npm install
    - npm run test 2>/dev/null || echo "No test script found, skipping tests"
  artifacts:
    paths:
      - Code/client/coverage/
    expire_in: 1 week
    when: always
  only:
    - master

build:
  stage: build
  dependencies:
    - test
  script:
    - echo "Building Vue frontend..."
    - cd Code/client
    - npm install
    - npm run build
    - echo "Build completed, checking output directories:"
    - ls -la ../server/core/static/core/
    - echo "Files built:"
    - find ../server/core/static/core/ -name "*.html" -o -name "*.js" -o -name "*.css"
  artifacts:
    paths:
      - Code/server/
    expire_in: 1 week
  only:
    - master

deploy:
  stage: deploy
  dependencies:
    - build
  script:
    - echo "Deploying Django application to Azure VM..."
    
    # Create Django app directory on VM
    - ssh -i $PEM_KEY_PATH -o StrictHostKeyChecking=no azureuser@$VM_PUBLIC_IP "sudo mkdir -p /var/www/django-app && sudo chown azureuser:azureuser /var/www/django-app"
    
    # Remove old deployment
    - ssh -i $PEM_KEY_PATH -o StrictHostKeyChecking=no azureuser@$VM_PUBLIC_IP "rm -rf /var/www/django-app/*"
    
    # Upload Django application
    - scp -i $PEM_KEY_PATH -o StrictHostKeyChecking=no -r Code/server/* azureuser@$VM_PUBLIC_IP:/var/www/django-app/
    
    # Set up Python environment and install dependencies
    - |
      ssh -i $PEM_KEY_PATH -o StrictHostKeyChecking=no azureuser@$VM_PUBLIC_IP "
      cd /var/www/django-app &&
      python3 -m venv venv &&
      source venv/bin/activate &&
      pip install -r requirements.txt &&
      python manage.py collectstatic --noinput --settings=server.settings
      "
    
    # Configure Apache for Django with WSGI
    - |
      ssh -i $PEM_KEY_PATH -o StrictHostKeyChecking=no azureuser@$VM_PUBLIC_IP "
      sudo apt-get update &&
      sudo apt-get install -y libapache2-mod-wsgi-py3 &&
      sudo a2enmod wsgi &&
      sudo tee /etc/apache2/sites-available/django-app.conf > /dev/null << 'EOF'
      <VirtualHost *:80>
          ServerName localhost
          DocumentRoot /var/www/django-app
          
          WSGIDaemonProcess djangoapp python-path=/var/www/django-app python-home=/var/www/django-app/venv
          WSGIProcessGroup djangoapp
          WSGIScriptAlias / /var/www/django-app/server/wsgi.py
          
          <Directory /var/www/django-app/server>
              <Files wsgi.py>
                  Require all granted
              </Files>
          </Directory>
          
          Alias /static /var/www/django-app/core/static
          <Directory /var/www/django-app/core/static>
              Require all granted
          </Directory>
          
          ErrorLog \${APACHE_LOG_DIR}/django_error.log
          CustomLog \${APACHE_LOG_DIR}/django_access.log combined
      </VirtualHost>
      EOF
      "
    
    # Enable site and restart Apache
    - |
      ssh -i $PEM_KEY_PATH -o StrictHostKeyChecking=no azureuser@$VM_PUBLIC_IP "
      sudo a2dissite 000-default &&
      sudo a2ensite django-app &&
      sudo chown -R www-data:www-data /var/www/django-app &&
      sudo systemctl restart apache2
      "
    
    - echo "Django deployment completed"
  only:
    - master