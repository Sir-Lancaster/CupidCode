image: node:18

stages:
  - test
  - build
  - deploy

before_script:
  - apt-get update && apt-get install -y openssh-client python3-pip
  - |
    mkdir -p ~/.ssh
    chmod 700 ~/.ssh
    PEM_KEY_PATH=~/key.pem
    echo "$AZURE_PRIVATE_KEY_B64" | base64 -d > $PEM_KEY_PATH
    chmod 600 $PEM_KEY_PATH
    ssh-keyscan -H $VM_PUBLIC_IP >> ~/.ssh/known_hosts 2>/dev/null || echo "Could not scan host, continuing..."
    if ! ssh-keygen -yf $PEM_KEY_PATH > /dev/null 2>&1; then
      echo "ERROR: Private key is invalid or not in a supported format."
      exit 1
    fi

test:
  stage: test
  script:
    - echo "Running tests..."
    - cd Code/client
    - npm install
    - npm run test 2>/dev/null || echo "No test script found, skipping tests"
  only:
    - yaml

build:
  stage: build
  script:
    - echo "Building Vue frontend..."
    - cd Code/client
    - npm install
    - npm run build
    - echo "Build completed"
    - ls -la
  artifacts:
    paths:
      - Code/
    expire_in: 1 week
  only:
    - yaml

deploy:
  stage: deploy
  dependencies:
    - build
  script:
    - echo "Deploying complete Django + Vue application to Azure VM with HTTPS..."
    - ssh -i $PEM_KEY_PATH -o StrictHostKeyChecking=no azureuser@$VM_PUBLIC_IP "sudo mkdir -p /var/www/cupid-app && sudo chown azureuser:azureuser /var/www/cupid-app"
    - ssh -i $PEM_KEY_PATH -o StrictHostKeyChecking=no azureuser@$VM_PUBLIC_IP "sudo chown -R azureuser:azureuser /var/www/cupid-app && sudo rm -rf /var/www/cupid-app/*"
    - scp -i $PEM_KEY_PATH -o StrictHostKeyChecking=no -r Code/* azureuser@$VM_PUBLIC_IP:/var/www/cupid-app/
    - ssh -i $PEM_KEY_PATH -o StrictHostKeyChecking=no azureuser@$VM_PUBLIC_IP "cd /var/www/cupid-app && sudo apt-get update && sudo apt-get install -y python3-pip python3-venv certbot python3-certbot-apache libapache2-mod-wsgi-py3"
    - ssh -i $PEM_KEY_PATH -o StrictHostKeyChecking=no azureuser@$VM_PUBLIC_IP "cd /var/www/cupid-app/server && python3 -m venv venv && source venv/bin/activate && pip install -r requirements.txt"
    - ssh -i $PEM_KEY_PATH -o StrictHostKeyChecking=no azureuser@$VM_PUBLIC_IP "cd /var/www/cupid-app/server && source venv/bin/activate && python manage.py migrate --noinput && python manage.py collectstatic --noinput"
    - ssh -i $PEM_KEY_PATH -o StrictHostKeyChecking=no azureuser@$VM_PUBLIC_IP "sudo a2enmod wsgi ssl rewrite"
    - ssh -i $PEM_KEY_PATH -o StrictHostKeyChecking=no azureuser@$VM_PUBLIC_IP "echo 'WSGIPythonPath /var/www/cupid-app/server:/var/www/cupid-app/server/venv/lib/python3.12/site-packages' | sudo tee /etc/apache2/conf-available/wsgi.conf"
    - ssh -i $PEM_KEY_PATH -o StrictHostKeyChecking=no azureuser@$VM_PUBLIC_IP "sudo a2enconf wsgi"
    - |
      ssh -i $PEM_KEY_PATH -o StrictHostKeyChecking=no azureuser@$VM_PUBLIC_IP "sudo tee /etc/apache2/sites-available/cupid-app.conf > /dev/null << 'EOF'
      <VirtualHost *:80>
          ServerName cupidcode.zapto.org
          ServerAlias www.cupidcode.zapto.org
          DocumentRoot /var/www/cupid-app
          
          RewriteEngine On
          RewriteCond %{HTTPS} off
          RewriteRule ^(.*)$ https://%{HTTP_HOST}%{REQUEST_URI} [R=301,L]
          
          ErrorLog \${APACHE_LOG_DIR}/cupid_error.log
          CustomLog \${APACHE_LOG_DIR}/cupid_access.log combined
      </VirtualHost>
      EOF"
    - ssh -i $PEM_KEY_PATH -o StrictHostKeyChecking=no azureuser@$VM_PUBLIC_IP "if [ ! -f /etc/letsencrypt/live/cupidcode.zapto.org/fullchain.pem ]; then sudo certbot --apache -d cupidcode.zapto.org --non-interactive --agree-tos --email dallinctew@gmail.com; fi"
    - |
      ssh -i $PEM_KEY_PATH -o StrictHostKeyChecking=no azureuser@$VM_PUBLIC_IP "sudo tee /etc/apache2/sites-available/cupid-app-le-ssl.conf > /dev/null << 'EOF'
      <VirtualHost *:443>
          ServerName cupidcode.zapto.org
          DocumentRoot /var/www/cupid-app
          
          WSGIScriptAlias / /var/www/cupid-app/server/wsgi.py
          WSGIApplicationGroup %{GLOBAL}
          WSGIScriptReloading Off
          
          <Directory /var/www/cupid-app/server>
              <Files wsgi.py>
                  Require all granted
              </Files>
          </Directory>
          
          Alias /static /var/www/cupid-app/staticfiles
          <Directory /var/www/cupid-app/staticfiles>
              Require all granted
          </Directory>
          
          ErrorLog \${APACHE_LOG_DIR}/cupid_ssl_error.log
          CustomLog \${APACHE_LOG_DIR}/cupid_ssl_access.log combined
          
          SSLCertificateFile /etc/letsencrypt/live/cupidcode.zapto.org/fullchain.pem
          SSLCertificateKeyFile /etc/letsencrypt/live/cupidcode.zapto.org/privkey.pem
          Include /etc/letsencrypt/options-ssl-apache.conf
      </VirtualHost>
      EOF"
    - ssh -i $PEM_KEY_PATH -o StrictHostKeyChecking=no azureuser@$VM_PUBLIC_IP "sudo a2dissite 000-default.conf 2>/dev/null || echo 'Default site already disabled'"
    - ssh -i $PEM_KEY_PATH -o StrictHostKeyChecking=no azureuser@$VM_PUBLIC_IP "sudo a2ensite cupid-app.conf && sudo a2ensite cupid-app-le-ssl.conf"
    - ssh -i $PEM_KEY_PATH -o StrictHostKeyChecking=no azureuser@$VM_PUBLIC_IP "sudo chown -R www-data:www-data /var/www/cupid-app && sudo systemctl restart apache2"
    - ssh -i $PEM_KEY_PATH -o StrictHostKeyChecking=no azureuser@$VM_PUBLIC_IP "curl -I http://localhost/ 2>/dev/null | head -3 || echo 'HTTP test failed'"
    - ssh -i $PEM_KEY_PATH -o StrictHostKeyChecking=no azureuser@$VM_PUBLIC_IP "curl -k -I https://localhost/ 2>/dev/null | head -3 || echo 'HTTPS test failed'"
    - echo "Complete Django + Vue deployment with HTTPS finished!"
    - echo "Site accessible at: https://cupidcode.zapto.org"
    - echo "HTTP requests automatically redirect to HTTPS"
  only:
    - yaml