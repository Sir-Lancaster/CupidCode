image: node:18

stages:
  - test
  - build
  - deploy

before_script:
  - apt-get update && apt-get install -y openssh-client python3-pip
  - |
    mkdir -p ~/.ssh
    chmod 700 ~/.ssh
    PEM_KEY_PATH=~/key.pem
    echo "$AZURE_PRIVATE_KEY_B64" | base64 -d > $PEM_KEY_PATH
    chmod 600 $PEM_KEY_PATH
    ssh-keyscan -H $VM_PUBLIC_IP >> ~/.ssh/known_hosts 2>/dev/null || echo "Could not scan host, continuing..."
    if ! ssh-keygen -yf $PEM_KEY_PATH > /dev/null 2>&1; then
      echo "ERROR: Private key is invalid or not in a supported format."
      exit 1
    fi

test:
  stage: test
  script:
    - echo "Running tests..."
    - cd Code/client
    - npm install
    - npm run test 2>/dev/null || echo "No test script found, skipping tests"
  only:
    - yaml

build:
  stage: build
  script:
    - echo "Building Vue frontend..."
    - cd Code/client
    - npm install
    - npm run build
    - echo "Build completed"
    - ls -la ../server/core/static/core/
    - echo "Preparing complete Django application..."
    - cd ../server
    - echo "Django files:"
    - ls -la
  artifacts:
    paths:
      - Code/server/
    expire_in: 1 week
  only:
    - yaml

deploy:
  stage: deploy
  dependencies:
    - build
  script:
    - echo "Deploying complete Django + Vue application to Azure VM with HTTPS support..."
    - ssh -i $PEM_KEY_PATH -o StrictHostKeyChecking=no azureuser@$VM_PUBLIC_IP "sudo mkdir -p /var/www/cupid-app && sudo chown azureuser:azureuser /var/www/cupid-app"
    - ssh -i $PEM_KEY_PATH -o StrictHostKeyChecking=no azureuser@$VM_PUBLIC_IP "sudo chown -R azureuser:azureuser /var/www/cupid-app && sudo rm -rf /var/www/cupid-app/*"
    - scp -i $PEM_KEY_PATH -o StrictHostKeyChecking=no -r Code/server/* azureuser@$VM_PUBLIC_IP:/var/www/cupid-app/
    - |
      ssh -i $PEM_KEY_PATH -o StrictHostKeyChecking=no azureuser@$VM_PUBLIC_IP "
      cd /var/www/cupid-app
      cat > .env << 'ENVEOF'
      DEBUG=False
      SECRET_KEY=your-production-secret-key-here-change-this-in-production
      ALLOWED_HOSTS=cupidcode.zapto.org,www.cupidcode.zapto.org,localhost,127.0.0.1
      DATABASE_URL=sqlite:///db.sqlite3
      STATIC_ROOT=/var/www/cupid-app/staticfiles
      STATIC_URL=/static/
      SECURE_SSL_REDIRECT=True
      SECURE_PROXY_SSL_HEADER=('HTTP_X_FORWARDED_PROTO', 'https')
      SESSION_COOKIE_SECURE=True
      CSRF_COOKIE_SECURE=True
      ENVEOF
      "
    - |
      ssh -i $PEM_KEY_PATH -o StrictHostKeyChecking=no azureuser@$VM_PUBLIC_IP "
      cd /var/www/cupid-app
      echo '' >> server/settings.py
      echo '# Production HTTPS settings' >> server/settings.py
      echo 'import os' >> server/settings.py
      echo 'STATIC_ROOT = os.path.join(BASE_DIR, \"staticfiles\")' >> server/settings.py
      echo 'ALLOWED_HOSTS = [\"cupidcode.zapto.org\", \"www.cupidcode.zapto.org\", \"localhost\", \"127.0.0.1\"]' >> server/settings.py
      echo 'DEBUG = False' >> server/settings.py
      echo 'SECURE_SSL_REDIRECT = True' >> server/settings.py
      echo 'SECURE_PROXY_SSL_HEADER = (\"HTTP_X_FORWARDED_PROTO\", \"https\")' >> server/settings.py
      echo 'SESSION_COOKIE_SECURE = True' >> server/settings.py
      echo 'CSRF_COOKIE_SECURE = True' >> server/settings.py
      echo 'SECURE_BROWSER_XSS_FILTER = True' >> server/settings.py
      echo 'SECURE_CONTENT_TYPE_NOSNIFF = True' >> server/settings.py
      "
    - |
      ssh -i $PEM_KEY_PATH -o StrictHostKeyChecking=no azureuser@$VM_PUBLIC_IP "
      cd /var/www/cupid-app
      sudo apt-get update
      sudo apt-get install -y python3-pip python3-venv libapache2-mod-wsgi-py3
      python3 -m venv venv
      source venv/bin/activate
      pip install -r requirements.txt
      mkdir -p staticfiles
      python manage.py migrate --noinput
      python manage.py collectstatic --noinput
      mkdir -p staticfiles/assets/
      cp staticfiles/core/assets/* staticfiles/assets/ 2>/dev/null || echo 'No Vue assets to copy'
      "
    - ssh -i $PEM_KEY_PATH -o StrictHostKeyChecking=no azureuser@$VM_PUBLIC_IP "cd /var/www/cupid-app && cat > server/wsgi.py" < deploy_scripts/wsgi_content.py
    - ssh -i $PEM_KEY_PATH -o StrictHostKeyChecking=no azureuser@$VM_PUBLIC_IP "sudo tee /etc/apache2/sites-available/cupid-app.conf" < deploy_scripts/apache_http.conf
    - ssh -i $PEM_KEY_PATH -o StrictHostKeyChecking=no azureuser@$VM_PUBLIC_IP "sudo tee /etc/apache2/sites-available/cupid-app-le-ssl.conf" < deploy_scripts/apache_https.conf
    - |
      ssh -i $PEM_KEY_PATH -o StrictHostKeyChecking=no azureuser@$VM_PUBLIC_IP "
      sudo a2enmod wsgi
      sudo a2enmod ssl
      sudo a2enmod headers
      sudo a2enmod rewrite
      sudo a2dissite 000-default.conf 2>/dev/null || echo 'Default site already disabled'
      sudo a2ensite cupid-app.conf
      sudo a2ensite cupid-app-le-ssl.conf
      sudo chown -R www-data:www-data /var/www/cupid-app
      sudo chmod -R 755 /var/www/cupid-app
      sudo apache2ctl configtest
      sudo systemctl restart apache2
      sudo systemctl status apache2 --no-pager
      "
    - echo "Complete Django + Vue deployment with HTTPS finished!"
    - echo "Your application should be available at https://cupidcode.zapto.org"
  only:
    - yaml