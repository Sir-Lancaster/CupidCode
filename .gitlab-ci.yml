image: node:18

stages:
  - build
  - deploy

before_script:
  - apt-get update && apt-get install -y openssh-client
  - |
    mkdir -p ~/.ssh
    chmod 700 ~/.ssh
    echo "$AZURE_PRIVATE_KEY_B64" | base64 -d > ~/.ssh/id_rsa
    chmod 600 ~/.ssh/id_rsa
    ssh-keyscan -H $VM_PUBLIC_IP >> ~/.ssh/known_hosts 2>/dev/null
    if ! ssh-keygen -y -f ~/.ssh/id_rsa > /dev/null 2>&1; then
      echo "ERROR: Private key is invalid or not in a supported format."
      exit 1
    else
      echo "SSH key setup successful"
    fi

build:
  stage: build
  script:
    - cd Code/client
    - npm install
    - npm run build
    - echo "Build completed, checking output:"
    - ls -la ../server/core/static/core/
    - echo "Contents of build directory:"
    - find ../server/core/static/core/ -type f | head -10
    - |
      test -f ../server/core/static/core/index.html && 
      echo "index.html found" || 
      echo "ERROR: index.html not found"
  artifacts:
    paths:
      - Code/server/core/static/core/
    expire_in: 1 week
  only:
    - master

deploy:
  stage: deploy
  dependencies:
    - build
  script:
    - echo "Deploying artifacts..."
    - echo "Files to deploy:"
    - ls -la Code/server/core/static/core/
    - echo "Checking for index.html:"
    - |
      test -f Code/server/core/static/core/index.html && 
      echo "index.html ready for deployment" || 
      echo "ERROR: No index.html to deploy"
    - ssh -o StrictHostKeyChecking=no azureuser@$VM_PUBLIC_IP "sudo rm -rf /var/www/html/*"
    - scp -o StrictHostKeyChecking=no -r Code/server/core/static/core/* azureuser@$VM_PUBLIC_IP:/var/www/html/
    - ssh -o StrictHostKeyChecking=no azureuser@$VM_PUBLIC_IP "sudo chown -R www-data:www-data /var/www/html/"
    - ssh -o StrictHostKeyChecking=no azureuser@$VM_PUBLIC_IP "sudo chmod -R 755 /var/www/html/"
    - echo "Verifying deployment:"
    - ssh -o StrictHostKeyChecking=no azureuser@$VM_PUBLIC_IP "ls -la /var/www/html/ | head -10"
    - |
      ssh -o StrictHostKeyChecking=no azureuser@$VM_PUBLIC_IP 
      "test -f /var/www/html/index.html && 
      echo 'index.html deployed successfully' || 
      echo 'ERROR: index.html not found on server'"
    - ssh -o StrictHostKeyChecking=no azureuser@$VM_PUBLIC_IP "sudo systemctl restart apache2"
  only:
    - master