image: node:18

stages:
  - test
  - build
  - deploy

before_script:
  - apt-get update && apt-get install -y openssh-client python3-pip
  - |
    mkdir -p ~/.ssh
    chmod 700 ~/.ssh
    PEM_KEY_PATH=~/key.pem
    echo "$AZURE_PRIVATE_KEY_B64" | base64 -d > $PEM_KEY_PATH
    chmod 600 $PEM_KEY_PATH
    ssh-keyscan -H $VM_PUBLIC_IP >> ~/.ssh/known_hosts 2>/dev/null || echo "Could not scan host, continuing..."
    if ! ssh-keygen -yf $PEM_KEY_PATH > /dev/null 2>&1; then
      echo "ERROR: Private key is invalid or not in a supported format."
      exit 1
    fi

test:
  stage: test
  script:
    - echo "Running tests..."
    - cd Code/client
    - npm install
    - npm run test 2>/dev/null || echo "No test script found, skipping tests"
  only:
    - master

build:
  stage: build
  script:
    - echo "Building Vue frontend..."
    - cd Code/client
    - npm install
    - npm run build
    - echo "Build completed"
    - ls -la ../server/core/static/core/
    - echo "Preparing complete Django application..."
    - cd ../server
    - echo "Django files:"
    - ls -la
    # Generate requirements.txt from pyproject.toml if it doesn't exist
    - |
      if [ ! -f requirements.txt ]; then
        echo "Generating requirements.txt from pyproject.toml..."
        pip install poetry
        cd ..
        poetry export -f requirements.txt --output server/requirements.txt --without-hashes
        cd server
        echo "Generated requirements.txt:"
        cat requirements.txt
      fi
  artifacts:
    paths:
      - Code/server/
    expire_in: 1 week
  only:
    - master

deploy:
  stage: deploy
  dependencies:
    - build
  script:
    - echo "Deploying complete Django + Vue application to Azure VM..."
    
    # Create application directory
    - ssh -i $PEM_KEY_PATH -o StrictHostKeyChecking=no azureuser@$VM_PUBLIC_IP "sudo mkdir -p /var/www/cupid-app && sudo chown azureuser:azureuser /var/www/cupid-app"
    
    # Clean previous deployment with proper permissions
    - ssh -i $PEM_KEY_PATH -o StrictHostKeyChecking=no azureuser@$VM_PUBLIC_IP "sudo chown -R azureuser:azureuser /var/www/cupid-app && sudo rm -rf /var/www/cupid-app/*"
    
    # Upload Django application
    - scp -i $PEM_KEY_PATH -o StrictHostKeyChecking=no -r Code/server/* azureuser@$VM_PUBLIC_IP:/var/www/cupid-app/
    
    # Install Python dependencies first
    - |
      ssh -i $PEM_KEY_PATH -o StrictHostKeyChecking=no azureuser@$VM_PUBLIC_IP "
      cd /var/www/cupid-app &&
      sudo apt-get update &&
      sudo apt-get install -y python3-pip python3-venv &&
      python3 -m venv venv &&
      source venv/bin/activate &&
      pip install django python-dotenv &&
      if [ -f requirements.txt ]; then
        pip install -r requirements.txt
      else
        echo 'No requirements.txt found, installing basic packages'
        pip install djangorestframework pillow requests
      fi
      "
    
    # Create production .env file in the correct location (same directory as manage.py)
    - |
      ssh -i $PEM_KEY_PATH -o StrictHostKeyChecking=no azureuser@$VM_PUBLIC_IP "
      cd /var/www/cupid-app &&
      cat > .env << 'EOF'
      DEBUG=False
      SECRET_KEY=your-production-secret-key-here-change-this-in-production
      ALLOWED_HOSTS=*
      DATABASE_URL=sqlite:///db.sqlite3
      STATIC_ROOT=/var/www/cupid-app/staticfiles
      STATIC_URL=/static/
      ASSET_URL=
      FILE_EXTENSION=png
      VAULT_PATH=/var/www/cupid-app/core/static/
      DJANGO_SETTINGS_MODULE=server.settings
      EOF
      "
    
    # Setup Django with explicit environment variables
    - |
      ssh -i $PEM_KEY_PATH -o StrictHostKeyChecking=no azureuser@$VM_PUBLIC_IP "
      cd /var/www/cupid-app &&
      source venv/bin/activate &&
      mkdir -p staticfiles &&
      mkdir -p core/static &&
      mkdir -p media &&
      # Copy built Vue files to static directory
      cp -r core/static/* staticfiles/ 2>/dev/null || echo 'No core static files found' &&
      export DJANGO_SETTINGS_MODULE=server.settings &&
      export DEBUG=False &&
      export SECRET_KEY=your-production-secret-key-here-change-this-in-production &&
      export ALLOWED_HOSTS=* &&
      export DATABASE_URL=sqlite:///db.sqlite3 &&
      export STATIC_ROOT=/var/www/cupid-app/staticfiles &&
      export STATIC_URL=/static/ &&
      export ASSET_URL= &&
      export FILE_EXTENSION=png &&
      export VAULT_PATH=/var/www/cupid-app/core/static/ &&
      cd server &&
      python manage.py migrate --noinput &&
      python manage.py collectstatic --noinput --clear
      "
    
    # Configure Apache with mod_wsgi for Django with correct WSGI path and environment
    - |
      ssh -i $PEM_KEY_PATH -o StrictHostKeyChecking=no azureuser@$VM_PUBLIC_IP "
      sudo apt-get install -y libapache2-mod-wsgi-py3 &&
      sudo a2enmod wsgi &&
      sudo tee /etc/apache2/sites-available/cupid-app.conf > /dev/null << 'EOF'
      <VirtualHost *:80>
          ServerName localhost
          DocumentRoot /var/www/cupid-app
          
          # Set environment variables for Django
          SetEnv DEBUG False
          SetEnv SECRET_KEY your-production-secret-key-here-change-this-in-production
          SetEnv ALLOWED_HOSTS *
          SetEnv DATABASE_URL sqlite:///db.sqlite3
          SetEnv STATIC_ROOT /var/www/cupid-app/staticfiles
          SetEnv STATIC_URL /static/
          SetEnv ASSET_URL 
          SetEnv FILE_EXTENSION png
          SetEnv VAULT_PATH /var/www/cupid-app/core/static/
          SetEnv DJANGO_SETTINGS_MODULE server.settings
          
          WSGIDaemonProcess cupidapp python-path=/var/www/cupid-app python-home=/var/www/cupid-app/venv
          WSGIProcessGroup cupidapp
          WSGIScriptAlias / /var/www/cupid-app/server/server/wsgi.py
          
          <Directory /var/www/cupid-app>
              WSGIApplicationGroup %{GLOBAL}
              Require all granted
          </Directory>
          
          <Directory /var/www/cupid-app/server/server>
              <Files wsgi.py>
                  Require all granted
              </Files>
          </Directory>
          
          Alias /static /var/www/cupid-app/staticfiles
          <Directory /var/www/cupid-app/staticfiles>
              Require all granted
          </Directory>
          
          Alias /media /var/www/cupid-app/media
          <Directory /var/www/cupid-app/media>
              Require all granted
          </Directory>
          
          ErrorLog \${APACHE_LOG_DIR}/cupid_error.log
          CustomLog \${APACHE_LOG_DIR}/cupid_access.log combined
          LogLevel info
      </VirtualHost>
      EOF
      "
    
    # Enable the site and restart Apache with proper permissions
    - |
      ssh -i $PEM_KEY_PATH -o StrictHostKeyChecking=no azureuser@$VM_PUBLIC_IP "
      sudo a2dissite 000-default.conf 2>/dev/null || echo 'Default site already disabled' &&
      sudo a2dissite django-app.conf 2>/dev/null || echo 'Previous django site not found' &&
      sudo a2ensite cupid-app.conf &&
      sudo chown -R www-data:www-data /var/www/cupid-app &&
      sudo chmod -R 755 /var/www/cupid-app &&
      # Create database if it doesn't exist and set permissions
      sudo -u www-data touch /var/www/cupid-app/server/db.sqlite3 &&
      sudo chmod 664 /var/www/cupid-app/server/db.sqlite3 &&
      sudo systemctl restart apache2
      "
    
    # Debug and verify deployment
    - |
      ssh -i $PEM_KEY_PATH -o StrictHostKeyChecking=no azureuser@$VM_PUBLIC_IP "
      echo 'Directory structure check:' &&
      find /var/www/cupid-app -name '*.py' | grep -E '(wsgi|settings)' &&
      echo '' &&
      echo 'Environment check:' &&
      cd /var/www/cupid-app/server &&
      source ../venv/bin/activate &&
      python -c 'import sys; print(sys.path)' &&
      echo '' &&
      echo 'Django check:' &&
      export DJANGO_SETTINGS_MODULE=server.settings &&
      python manage.py check --deploy 2>&1 || echo 'Django check failed'
      "
    
    # Verify deployment and test environment variables
    - |
      ssh -i $PEM_KEY_PATH -o StrictHostKeyChecking=no azureuser@$VM_PUBLIC_IP "
      echo 'Deployment verification:' &&
      ls -la /var/www/cupid-app/ &&
      echo '' &&
      echo 'Checking .env file location and content:' &&
      cat /var/www/cupid-app/.env &&
      echo '' &&
      echo 'Testing Django settings with environment variables:' &&
      cd /var/www/cupid-app &&
      source venv/bin/activate &&
      export DEBUG=False &&
      export SECRET_KEY=test-key &&
      export ALLOWED_HOSTS=* &&
      export DATABASE_URL=sqlite:///db.sqlite3 &&
      export STATIC_ROOT=/var/www/cupid-app/staticfiles &&
      export STATIC_URL=/static/ &&
      export ASSET_URL= &&
      export FILE_EXTENSION=png &&
      export VAULT_PATH=/var/www/cupid-app/core/static/ &&
      python -c 'import django; import os; os.environ.setdefault(\"DJANGO_SETTINGS_MODULE\", \"server.settings\"); django.setup(); from django.conf import settings; print(\"STATIC_ROOT:\", settings.STATIC_ROOT)' &&
      echo '' &&
      echo 'Checking WSGI file exists:' &&
      ls -la /var/www/cupid-app/server/server/wsgi.py &&
      echo '' &&
      echo 'Checking static files:' &&
      ls -la /var/www/cupid-app/staticfiles/ | head -5 &&
      echo '' &&
      echo 'Apache configuration test:' &&
      sudo apache2ctl configtest &&
      echo '' &&
      echo 'Apache status:' &&
      sudo systemctl status apache2 --no-pager -l | head -10 &&
      echo '' &&
      echo 'Apache error logs (last 10 lines):' &&
      sudo tail -10 /var/log/apache2/cupid_error.log 2>/dev/null || echo 'No error log found yet' &&
      echo '' &&
      echo 'Testing local connection:' &&
      sleep 5 &&
      curl -s -o /dev/null -w 'HTTP Status: %{http_code}\n' http://localhost/ || echo 'Connection test failed'
      "
    
    - echo "Complete Django + Vue deployment finished!"
  only:
    - master