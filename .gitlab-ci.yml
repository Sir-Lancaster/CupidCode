image: node:18

stages:
  - build
  - deploy

before_script:
  - apt-get update && apt-get install -y openssh-client
  - |
    # Setup SSH key
    mkdir -p ~/.ssh
    chmod 700 ~/.ssh
    echo "$AZURE_PRIVATE_KEY_B64" | base64 -d > ~/.ssh/id_rsa
    chmod 600 ~/.ssh/id_rsa
    ssh-keyscan -H $VM_PUBLIC_IP >> ~/.ssh/known_hosts 2>/dev/null

    if ! ssh-keygen -y -f ~/.ssh/id_rsa > /dev/null 2>&1; then
      echo "ERROR: Private key is invalid or not in a supported format."
      exit 1
    else
      echo "SSH key setup successful"
    fi

build:
  stage: build
  script:
    - cd Code/client
    - npm install
    # Build for production deployment (not Django)
    - npm run build -- --outDir dist
    - echo "Build completed, checking output:"
    - ls -la dist/
    - echo "Contents of dist directory:"
    - find dist/ -type f | head -10
    # Verify index.html exists
    - test -f dist/index.html && echo "index.html found" || echo "ERROR: index.html not found"
  artifacts:
    paths:
      - Code/client/dist/
    expire_in: 1 week
  only:
    - master

deploy:
  stage: deploy
  dependencies:
    - build
  script:
    - echo "Deploying artifacts..."
    - echo "Files to deploy:"
    - ls -la Code/client/dist/
    - echo "Checking for index.html:"
    - test -f Code/client/dist/index.html && echo "index.html ready for deployment" || echo "ERROR: No index.html to deploy"
    # Clear existing files
    - ssh -o StrictHostKeyChecking=no azureuser@$VM_PUBLIC_IP "sudo rm -rf /var/www/html/*"
    # Deploy the built files
    - scp -o StrictHostKeyChecking=no -r Code/client/dist/* azureuser@$VM_PUBLIC_IP:/var/www/html/
    # Set proper permissions
    - ssh -o StrictHostKeyChecking=no azureuser@$VM_PUBLIC_IP "sudo chown -R www-data:www-data /var/www/html/"
    - ssh -o StrictHostKeyChecking=no azureuser@$VM_PUBLIC_IP "sudo chmod -R 755 /var/www/html/"
    # Verify deployment
    - echo "Verifying deployment:"
    - ssh -o StrictHostKeyChecking=no azureuser@$VM_PUBLIC_IP "ls -la /var/www/html/ | head -10"
    - ssh -o StrictHostKeyChecking=no azureuser@$VM_PUBLIC_IP "test -f /var/www/html/index.html && echo 'index.html deployed successfully' || echo 'ERROR: index.html not found on server'"
    # Restart Apache
    - ssh -o StrictHostKeyChecking=no azureuser@$VM_PUBLIC_IP "sudo systemctl restart apache2"
  only:
    - master