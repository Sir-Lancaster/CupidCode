image: node:18

stages:
  - test
  - build
  - deploy

before_script:
  - apt-get update && apt-get install -y openssh-client python3-pip
  - mkdir -p ~/.ssh
  - chmod 700 ~/.ssh
  - export PEM_KEY_PATH="$HOME/key.pem"
  # Fix: Remove any carriage returns and decode properly
  - echo "$AZURE_PRIVATE_KEY_B64" | tr -d '\r' | base64 -d > "$PEM_KEY_PATH"
  - chmod 600 "$PEM_KEY_PATH"
  - export PEM_KEY_PATH
  - ssh-keyscan -H $VM_PUBLIC_IP >> ~/.ssh/known_hosts 2>/dev/null || echo "Could not scan host, continuing..."
  # Validate the key
  - |
    if ! ssh-keygen -yf $PEM_KEY_PATH > /dev/null 2>&1; then
      echo "ERROR: Private key is invalid or not in a supported format."
      exit 1
    fi

test:
  stage: test
  script:
    - echo "Running tests..."
    - cd Code/client
    - npm install
    - npm run test 2>/dev/null || echo "No test script found, skipping tests"
  only:
    - master

build:
  stage: build
  script:
    - echo "Building Vue frontend..."
    - cd Code/client
    - npm install
    - npm run build
    - echo "Build completed"
    - ls -la ../server/core/static/core/ || echo "Static directory not found yet"
    - echo "Preparing complete Django application..."
    - cd ../server
    - echo "Django files:"
    - ls -la
  artifacts:
    paths:
      - Code/server/
    expire_in: 1 week
  only:
    - master

deploy:
  stage: deploy
  dependencies:
    - build
  script:
    - echo "Deploying complete Django + Vue application to Azure VM..."
    
    # Step 1: Clean up existing Apache sites and processes
    - echo "Step 1: Cleaning up existing configurations..."
    - |
      ssh -i $PEM_KEY_PATH -o StrictHostKeyChecking=no azureuser@$VM_PUBLIC_IP << 'ENDSSH'
        set -e
        echo 'Cleaning up existing configurations...'
        sudo systemctl stop apache2 || true
        sudo pkill -f wsgi || echo 'No WSGI processes found'
        sudo a2dissite cupid-app.conf || echo 'Cupid site not found'
        sudo rm -f /etc/apache2/sites-available/cupid-app.conf
        echo 'Cleanup complete'
      ENDSSH
    
    # Step 2: Create application directory
    - echo "Step 2: Creating application directory..."
    - |
      ssh -i $PEM_KEY_PATH -o StrictHostKeyChecking=no azureuser@$VM_PUBLIC_IP << 'ENDSSH'
        set -e
        sudo mkdir -p /var/www/cupid-app
        sudo chown azureuser:azureuser /var/www/cupid-app
        echo 'Directory created'
      ENDSSH
    
    # Step 3: Clean previous deployment
    - echo "Step 3: Cleaning previous deployment..."
    - |
      ssh -i $PEM_KEY_PATH -o StrictHostKeyChecking=no azureuser@$VM_PUBLIC_IP << 'ENDSSH'
        set -e
        sudo chown -R azureuser:azureuser /var/www/cupid-app
        sudo rm -rf /var/www/cupid-app/*
        echo 'Previous deployment cleaned'
      ENDSSH
    
    # Step 4: Upload Django application
    - echo "Step 4: Uploading Django application..."
    - scp -i $PEM_KEY_PATH -o StrictHostKeyChecking=no -r Code/server/* azureuser@$VM_PUBLIC_IP:/var/www/cupid-app/
    - echo "Upload complete"
    
    # Step 5: Create production .env file
    - echo "Step 5: Creating production .env file..."
    - |
      ssh -i $PEM_KEY_PATH -o StrictHostKeyChecking=no azureuser@$VM_PUBLIC_IP << 'ENDSSH'
        set -e
        cd /var/www/cupid-app
        cat > .env << 'EOF'
      DEBUG=False
      SECRET_KEY=your-production-secret-key-here-change-this-in-production
      ALLOWED_HOSTS=*
      DATABASE_URL=sqlite:///db.sqlite3
      STATIC_ROOT=/var/www/cupid-app/staticfiles
      STATIC_URL=/static/
      EOF
        echo '.env file created'
      ENDSSH
    
    # Step 6: Add production settings
    - echo "Step 6: Configuring Django production settings..."
    - |
      ssh -i $PEM_KEY_PATH -o StrictHostKeyChecking=no azureuser@$VM_PUBLIC_IP << 'ENDSSH'
        set -e
        cd /var/www/cupid-app
        cat >> server/settings.py << 'EOF'

      # Production settings
      import os
      STATIC_ROOT = os.path.join(BASE_DIR, "staticfiles")
      ALLOWED_HOSTS = ["*", "20.66.30.49", "localhost", "127.0.0.1"]
      DEBUG = False
      EOF
        echo 'Production settings added'
      ENDSSH
    
    # Step 7: Install dependencies and setup Django
    - echo "Step 7: Installing Python dependencies and setting up Django..."
    - |
      ssh -i $PEM_KEY_PATH -o StrictHostKeyChecking=no azureuser@$VM_PUBLIC_IP << 'ENDSSH'
        set -e
        cd /var/www/cupid-app
        echo 'Updating apt packages...'
        sudo apt-get update -qq
        echo 'Installing Python packages...'
        sudo apt-get install -y python3-pip python3-venv
        echo 'Creating virtual environment...'
        python3 -m venv venv
        echo 'Activating virtual environment...'
        source venv/bin/activate
        echo 'Installing requirements...'
        pip install -r requirements.txt
        echo 'Creating staticfiles directory...'
        mkdir -p staticfiles
        echo 'Running migrations...'
        python manage.py migrate --noinput
        echo 'Collecting static files...'
        python manage.py collectstatic --noinput
        echo 'Django setup complete'
      ENDSSH
    
    # Step 8: Configure Apache
    - echo "Step 8: Configuring Apache with mod_wsgi..."
    - |
      ssh -i $PEM_KEY_PATH -o StrictHostKeyChecking=no azureuser@$VM_PUBLIC_IP << 'ENDSSH'
        set -e
        echo 'Installing Apache mod_wsgi...'
        sudo apt-get install -y libapache2-mod-wsgi-py3
        sudo a2enmod wsgi
        echo 'Creating Apache configuration...'
        sudo tee /etc/apache2/sites-available/cupid-app.conf > /dev/null << 'EOF'
      <VirtualHost *:80>
          ServerName localhost
          DocumentRoot /var/www/cupid-app
          
          WSGIDaemonProcess cupidapp2025 python-path=/var/www/cupid-app python-home=/var/www/cupid-app/venv display-name=cupid-wsgi user=www-data group=www-data
          WSGIProcessGroup cupidapp2025
          WSGIScriptAlias / /var/www/cupid-app/server/wsgi.py
          WSGIApplicationGroup %{GLOBAL}
          WSGIPassAuthorization On
          
          <Directory /var/www/cupid-app/server>
              <Files wsgi.py>
                  Require all granted
              </Files>
          </Directory>
          
          Alias /static /var/www/cupid-app/staticfiles
          <Directory /var/www/cupid-app/staticfiles>
              Require all granted
          </Directory>
          
          ErrorLog ${APACHE_LOG_DIR}/cupid_error.log
          CustomLog ${APACHE_LOG_DIR}/cupid_access.log combined
      </VirtualHost>
      EOF
        echo 'Apache configuration created'
      ENDSSH
    
    # Step 9: Enable site and restart Apache
    - echo "Step 9: Enabling site and restarting Apache..."
    - |
      ssh -i $PEM_KEY_PATH -o StrictHostKeyChecking=no azureuser@$VM_PUBLIC_IP << 'ENDSSH'
        set -e
        echo 'Enabling cupid-app site...'
        sudo a2ensite cupid-app.conf
        echo 'Setting permissions...'
        sudo chown -R www-data:www-data /var/www/cupid-app
        sudo chmod -R 755 /var/www/cupid-app
        echo 'Starting Apache...'
        sudo systemctl start apache2
        echo 'Reloading Apache...'
        sudo systemctl reload apache2
        echo 'Apache restarted successfully'
      ENDSSH
    
    - echo "Complete Django + Vue deployment finished!"
    - echo "Application should be available at http://$VM_PUBLIC_IP"
  only:
    - master