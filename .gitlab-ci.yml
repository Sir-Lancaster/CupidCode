image: node:18

stages:
  - test
  - build
  - deploy

before_script:
  - apt-get update && apt-get install -y openssh-client
  - |
    # Create SSH directory first
    mkdir -p ~/.ssh
    chmod 700 ~/.ssh
    
    PEM_KEY_PATH=~/key.pem
    echo "$AZURE_PRIVATE_KEY_B64" | base64 -d > $PEM_KEY_PATH
    chmod 600 $PEM_KEY_PATH
    
    # Add VM to known hosts
    ssh-keyscan -H $VM_PUBLIC_IP >> ~/.ssh/known_hosts 2>/dev/null || echo "Could not scan host, continuing..."

    if ! ssh-keygen -yf $PEM_KEY_PATH > /dev/null 2>&1; then
      echo "ERROR: Private key is invalid or not in a supported format."
      exit 1
    fi

test:
  stage: test
  script:
    - echo "Running tests..."
    - cd Code/client
    - npm install
    - npm run test 2>/dev/null || echo "No test script found, skipping tests"
  artifacts:
    paths:
      - Code/client/coverage/
    expire_in: 1 week
    when: always
  only:
    - master

build:
  stage: build
  dependencies:
    - test
  script:
    - echo "Building Vue frontend..."
    - cd Code/client
    - npm install
    - npm run build
    - echo "Build completed, checking output directories:"
    - ls -la
    - ls -la dist/ 2>/dev/null || echo "No dist directory"
    - ls -la build/ 2>/dev/null || echo "No build directory"
    - find . -name "*.html" -o -name "*.js" -o -name "*.css" | head -10
  artifacts:
    paths:
      - Code/client/dist/
      - Code/client/build/
    expire_in: 1 week
  only:
    - master

deploy:
  stage: deploy
  dependencies:
    - build
  script:
    - echo "Deploying to Azure VM..."
    - echo "Checking available files:"
    - ls -la Code/client/
    - |
      if [ -d "Code/client/dist" ]; then
        BUILD_DIR="Code/client/dist"
      elif [ -d "Code/client/build" ]; then
        BUILD_DIR="Code/client/build"
      else
        echo "ERROR: No build output directory found"
        exit 1
      fi
    - echo "Using build directory: $BUILD_DIR"
    - ls -la $BUILD_DIR/
    - ssh -i $PEM_KEY_PATH -o StrictHostKeyChecking=no azureuser@$VM_PUBLIC_IP "sudo rm -rf /var/www/html/*"
    - scp -i $PEM_KEY_PATH -o StrictHostKeyChecking=no -r $BUILD_DIR/* azureuser@$VM_PUBLIC_IP:/var/www/html/
    - ssh -i $PEM_KEY_PATH -o StrictHostKeyChecking=no azureuser@$VM_PUBLIC_IP "sudo systemctl restart apache2"
    - echo "Deployment completed"
  only:
    - master